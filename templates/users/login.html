{% extends "users/base.html" %}

{% block head_content %}
<title>ProgramFidel sign in</title>
{% endblock%}

{% block container %}
	
	{% if form.errors %}
	<p class="alert alert-darnger">
		Your username and password didn't match. Please try again.
	</p>
	{% endif %}
	
	<form method="POST" action="{% url "users:login" %}">
		{% csrf_token %}

		<div class="form-group">
			<input class="form-control" type="text" placeholder="Username:" name="username">
		</div>
		
		<div class="form-group">
			<input class="form-control" type="password" placeholder="Password: " name="password">
		</div>

		<button class="btn btn-primary btn-block mt-5" type="submit">Sign In</button>

	</form>
	<p class="mt-4">Dont't have an account yet? <a href="{% url "users:signup" %}">Sign up here.</a></p>

{% endblock %}
